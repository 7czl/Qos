name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # 快速反馈：平台无关的共享 crate 测试
  test-common:
    name: Test qos-common
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: common
      - run: cargo test -p qos-common --all-targets

  # 完整构建：eBPF 编译 + 用户空间构建
  build:
    name: Build (eBPF + userspace)
    runs-on: ubuntu-latest
    needs: test-common
    steps:
      - uses: actions/checkout@v4

      # stable 用于用户空间，nightly 用于 eBPF（aya-build 自动切换）
      - uses: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install bpf-linker
        run: cargo +nightly install bpf-linker

      - uses: Swatinem/rust-cache@v2
        with:
          key: build

      # 构建用户空间（会触发 build.rs 编译 eBPF）
      - name: Build qos (release)
        run: cargo build -p qos --release

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: qos-x86_64-linux
          path: target/release/qos

  # 用户空间 crate 的测试（需要 eBPF 先编译好）
  test-userspace:
    name: Test qos userspace
    runs-on: ubuntu-latest
    needs: test-common
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: Install bpf-linker
        run: cargo +nightly install bpf-linker
      - uses: Swatinem/rust-cache@v2
        with:
          key: test
      - run: cargo test -p qos --all-targets

  # 代码质量检查
  lint:
    name: Clippy + Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check -p qos-common
      - run: cargo clippy -p qos-common -- -D warnings

  # 打 tag 时自动发布 release
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, test-userspace, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: qos-x86_64-linux
      - run: chmod +x qos
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: qos
          generate_release_notes: true
